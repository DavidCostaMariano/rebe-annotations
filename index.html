<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Rebe Annotations</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- LOGIN -->

  <div
    id="authScreen"
    class="auth-screen"
  >

    <div class="auth-box">

      <h1>Rebe Annotations</h1>

      <input
        type="email"
        id="emailInput"
        placeholder="Email"
      >

      <input
        type="password"
        id="passwordInput"
        placeholder="Senha"
      >

      <button id="loginButton">
        Entrar
      </button>

      <button id="registerButton">
        Criar Conta
      </button>

    </div>

  </div>

  <!-- APP -->

  <div
    id="app"
    style="display:none;"
  >

    <!-- TOPO -->

    <header class="topbar">

      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar por nome ou pedido..."
      >

      <input
        type="date"
        id="dateFilter"
      >

      <button id="newAnnotationButton">
        Nova Anotação
      </button>

      <button id="logoutButton">
        Sair
      </button>

    </header>

    <!-- CARDS -->

    <main
      class="cards-container"
      id="cardsContainer"
    ></main>

  </div>

  <!-- MODAL -->

  <div
    class="modal-overlay"
    id="modalOverlay"
  >

    <div class="modal">

      <div class="modal-header">

        <h2 id="modalTitle">
          Nova Anotação
        </h2>

        <button
          class="close-button"
          id="closeModalButton"
        >
          ✕
        </button>

      </div>

      <div class="modal-content">

        <div class="field">

          <label>Nome</label>

          <input
            type="text"
            id="modalNome"
          >

        </div>

        <div class="field">

          <label>Número do Pedido</label>

          <input
            type="text"
            id="modalPedido"
          >

        </div>

        <div class="field">

          <label>Descrição</label>

          <textarea
            id="modalDescricao"
          ></textarea>

        </div>

        <div class="modal-footer">

          <button
            id="deleteButton"
            class="delete-button"
          >
            Excluir
          </button>

          <button id="saveButton">
            Salvar
          </button>

        </div>

      </div>

    </div>

  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script src="script.js"></script>

</body>

</html>
